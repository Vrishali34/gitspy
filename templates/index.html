<!DOCTYPE html>
<html>
<head>
    <title>GitSpy</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #DCF4A2;
        }
        h1 {
            color: #0055A4;
        }
        p {
            color: #0055A4;
        }
        .tagline {
            font-style: italic;
            color: #0055A4;
            opacity: 0.75;
            margin-top: -8px;
            font-size: 14px;
        }
        #chat {
            border: 2px solid #0055A4;
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
            background: #ffffff;
        }
        .msg {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            white-space: pre-wrap;
            max-width: 85%;
        }
        .user {
            background: #0055A4;
            color: #DCF4A2;
            margin-left: auto;
            text-align: right;
        }
        .bot {
            background: #eef7d8;
            color: #003366;
            white-space: normal;
        }
        .bot table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
            font-size: 14px;
        }
        .bot th, .bot td {
            border: 1px solid #0055A4;
            padding: 6px 10px;
            text-align: left;
        }
        .bot th {
            background-color: #DCF4A2;
        }
        #inputRow {
            display: flex;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 10px;
            font-size: 15px;
            border: 2px solid #0055A4;
            border-radius: 6px;
        }
        input:disabled {
            background-color: #f0f0f0;
            cursor: not-allowed;
        }
        button {
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            background-color: #0055A4;
            color: #DCF4A2;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }
        button:hover {
            background-color: #003d75;
        }
        button:disabled {
            background-color: #7d99b8;
            cursor: not-allowed;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <h1>GitSpy </h1>
    <p class="tagline">Spy on any GitHub account's stats</p>
   
    <div id="chat"></div>
    <div id="inputRow">
        <input type="text" id="question" placeholder="Ask about a GitHub repo or account..." onkeydown="if(event.key==='Enter') askAgent()">
        <button id="sendBtn" onclick="askAgent()">Send</button>
    </div>

    <script>
        let isRequestPending = false;

        function addMessage(text, sender) {
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = "msg " + sender;

            if (sender === "bot") {
                const rawHtml = marked.parse(text);
                div.innerHTML = DOMPurify.sanitize(rawHtml);
            } else {
                div.innerText = text;
            }

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function askAgent() {
            if (isRequestPending) return;  // block spam clicks / double-submits

            const input = document.getElementById("question");
            const button = document.getElementById("sendBtn");
            const question = input.value.trim();
            if (!question) return;

            isRequestPending = true;
            input.disabled = true;
            button.disabled = true;

            addMessage(question, "user");
            input.value = "";

            const thinkingBubble = addMessage("Thinking...", "bot");

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                thinkingBubble.remove();
                addMessage(data.answer || data.error || "Something went wrong.", "bot");
            } catch (err) {
                thinkingBubble.remove();
                addMessage("Couldn't reach the server. Please check your connection and try again.", "bot");
            } finally {
                isRequestPending = false;
                input.disabled = false;
                button.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
