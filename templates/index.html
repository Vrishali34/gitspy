<!DOCTYPE html>
<html>
<head>
    <title>GitSpy - Your GitHub stats, decoded</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #DCF4A2;
        }
        h1 {
            color: #0055A4;
        }
        p {
            color: #0055A4;
        }
        #chat {
            border: 2px solid #0055A4;
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
            background: #ffffff;
        }
        .msg {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            white-space: pre-wrap;
            max-width: 85%;
        }
        .user {
            background: #0055A4;
            color: #DCF4A2;
            margin-left: auto;
            text-align: right;
        }
        .bot {
            background: #eef7d8;
            color: #003366;
        }
        #inputRow {
            display: flex;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 10px;
            font-size: 15px;
            border: 2px solid #0055A4;
            border-radius: 6px;
        }
        button {
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            background-color: #0055A4;
            color: #DCF4A2;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }
        button:hover {
            background-color: #003d75;
        }
    </style>
</head>
<body>
    <h1>GitSpy </h1>
    <p>Your GitHub stats, decoded:</p>
    <div id="chat"></div>
    <div id="inputRow">
        <input type="text" id="question" placeholder="Ask about a GitHub repo or account..." onkeydown="if(event.key==='Enter') askAgent()">
        <button onclick="askAgent()">Send</button>
    </div>

    <script>
        function addMessage(text, sender) {
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = "msg " + sender;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function askAgent() {
            const input = document.getElementById("question");
            const question = input.value.trim();
            if (!question) return;

            addMessage(question, "user");
            input.value = "";

            addMessage("Thinking...", "bot");

            const response = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question: question })
            });

            const data = await response.json();

            const chat = document.getElementById("chat");
            chat.removeChild(chat.lastChild);
            addMessage(data.answer || data.error, "bot");
        }
    </script>
</body>
</html>
